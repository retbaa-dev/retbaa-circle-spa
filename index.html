<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retbaa Circle — Private Wealth Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap" rel="stylesheet"/>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #f9f9f9;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      #splash.fade { opacity: 0; pointer-events: none; }
      #splash-title { font-family: Georgia,serif; font-style:italic; font-weight:300; font-size:28px; color:#1A3A6B; letter-spacing:-0.01em; margin:0; }
      #splash-sub { font-family:Arial,sans-serif; font-size:9px; letter-spacing:0.35em; text-transform:uppercase; color:#EFC0D4; font-weight:700; margin:10px 0 0; }
      #splash-dot { width:6px; height:6px; border-radius:50%; background:#EFC0D4; margin-top:28px; animation:pulse 1.2s ease-in-out infinite; }
      @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1.2)} }
    </style>
  </head>
  <body>
    <div id="splash">
      <p id="splash-title">Retbaa Circle</p>
      <p id="splash-sub">Portail Investisseurs</p>
      <div id="splash-dot"></div>
    </div>
    <div id="root"></div>
    <script>
      var splash = document.getElementById('splash');
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          splash.classList.add('fade');
          setTimeout(function(){ splash.style.display='none'; }, 400);
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true, subtree: true });
      setTimeout(function(){ splash.classList.add('fade'); setTimeout(function(){ splash.style.display='none'; },400); }, 10000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
